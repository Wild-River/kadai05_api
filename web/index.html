<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ココで音楽</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="app-header">
            <h1 class="app-title">ココで音楽</h1>
            <p class="app-tagline">風景に、音を。</p>
        </div>

        <!-- 丸い写真（押すと選択） -->
        <button id="photo-frame" class="photo-frame" aria-label="写真を選ぶ">
            <div class="photo-inner">
                <img id="photo-preview" class="photo-preview" alt="">
                <span id="photo-placeholder" class="photo-placeholder">
                    <span class="placeholder-icon">＋</span>
                    <span class="placeholder-text">写真を選ぶ</span>
                </span>

                <!-- 水アニメーション（生成中だけ表示） -->
                <div id="water-layer" class="water-layer">
                    <!-- 波の水面（SVGを3枚重ねる） -->
                    <div class="water-surface">
                        <svg class="wave wave-1" viewBox="0 0 400 70" preserveAspectRatio="none">
                            <path d="M0,35 Q50,0 100,35 T200,35 T300,35 T400,35 V70 H0 Z" />
                        </svg>
                        <svg class="wave wave-2" viewBox="0 0 400 70" preserveAspectRatio="none">
                            <path d="M0,40 Q50,68 100,40 T200,40 T300,40 T400,40 V70 H0 Z" />
                        </svg>
                        <svg class="wave wave-3" viewBox="0 0 400 70" preserveAspectRatio="none">
                            <path d="M0,35 Q60,8 120,35 T240,35 T360,35 T480,35 V70 H0 Z" />
                        </svg>
                    </div>
                    <!-- 水滴 -->
                    <div id="drops" class="drops">
                        <span class="drop"></span>
                        <span class="drop"></span>
                        <span class="drop"></span>
                    </div>
                </div>

            </div>
        </button>
        <input type="file" id="photo-input" accept="image/*" hidden>

        <!-- 曲名・コメント -->
        <div class="track-info">
            <p id="track-title" class="track-title">- - -</p>
            <p id="track-comment" class="track-comment">写真を選んで音楽を生成しよう</p>
        </div>

        <!-- 再生バー -->
        <div class="seek-area">
            <div id="seek-bar" class="seek-bar">
                <div id="seek-fill" class="seek-fill"></div>
            </div>
            <div class="seek-time">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <!-- コントロール -->
        <div class="controls">
            <button id="btn-back" class="ctrl-btn" aria-label="10秒戻る">
                <svg viewBox="0 0 24 24" class="ctrl-icon">
                    <path d="M11 6L4 12l7 6V6z M20 6l-7 6 7 6V6z" />
                </svg>
            </button>

            <button id="btn-play" class="ctrl-btn ctrl-play" aria-label="再生">
                <!-- 再生（三角） -->
                <svg viewBox="0 0 24 24" class="ctrl-icon icon-play">
                    <path d="M8 5v14l11-7z" />
                </svg>
                <!-- ポーズ（二本線） -->
                <svg viewBox="0 0 24 24" class="ctrl-icon icon-pause">
                    <path d="M6 5h4v14H6z M14 5h4v14h-4z" />
                </svg>
            </button>

            <button id="btn-forward" class="ctrl-btn" aria-label="10秒進む">
                <svg viewBox="0 0 24 24" class="ctrl-icon">
                    <path d="M13 6l7 6-7 6V6z M4 6l7 6-7 6V6z" />
                </svg>
            </button>
        </div>

        <!-- 音声（非表示・制御用） -->
        <audio id="player" hidden></audio>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
